### PANES ###
#
[panes.nav]
    show_preview = 60
    enter_prompt = false

    default_visibility = { hidden = true }

[panes.find]
    show_preview = 60
    enter_prompt = true

    on_leave_unset_dirs_only = true

[panes.search]
    enter_prompt         = true
    show_preview         = 20
    preview_layout_index = 1

    one_line           = true
    default_visibility = { ignore = true }
    default_sort       = "none"
    search_empty_query = true

    rg_status_template = '''
{blue:filter: {}} \s\m/\t
'''
    fs_status_template = '''
{red:query: {}} \s\m/\t
'''


### STYLES ####
#
[styles]


### SETTINGS ###
#
[fd]

[rg]

[notify]

[misc]
    append_mode_logging = true

[history]
    refind = "Search"

    ### ACTIONS ####

[stash.modes.backup]
    scratch  = false
    target   = true
    strategy = "copy"

[stash.modes.work]
    scratch  = true
    target   = false
    strategy = "none"

[stash.modes.scripts]
    scratch  = true
    target   = true
    strategy = { command = "echo {1} to {2}" }

[actions]
